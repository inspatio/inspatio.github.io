<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面</title>
    <style>
        /* 简单的样式让页面更好看 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background-color: #f4f7f6;
            text-align: center;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; }
        .status {
            display: inline-block;
            background: #27ae60;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #888;
        }
        a { color: #3498db; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="card">
        <div class="status">部署成功</div>
        <h1>你好，世界！🌍</h1>
        <p>如果你能看到这个页面，说明你的 <strong>GitHub Pages</strong> 已经配置完成。 </p>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        <p>这是我的第一个 GitHub.io 测试页面。</p>
        <p>
            <a href="https://github.com/">回到 GitHub</a> | 
            <a href="https://docs.github.com/pages">查看文档</a>
        </p>
    </div>

    <div class="footer">
        <p>© 2026 由 Gemini 辅助生成</p>
    </div>

</body>
</html>
